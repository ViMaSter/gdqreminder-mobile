name: iOS build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      forceRelease:
        description: Force App Store release?
        required: true
        default: false
        type: boolean
      runIntegrationTests:
        description: Skip integration tests?
        required: true
        default: false
        type: boolean

env:
  SENTRY_AUTH_TOKEN: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.SENTRY_AUTH_TOKEN || '' }}

jobs:
  prepareCache:
    name: Pre-build + test
    runs-on: macos-latest
    outputs:
      SENTRY_RELEASE: ${{ steps.version.outputs.SENTRY_RELEASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.ELEVATED_GITHUB_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: | 
          npm ci
      - name: Install Playwright Browsers
        if: ${{ github.event.inputs.runIntegrationTests }}
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        if: ${{ github.event.inputs.runIntegrationTests }}
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - run: | 
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease
      - id: version
        run: | 
          version=v$(jq -r .version package.json)
          echo $version
          echo "SENTRY_RELEASE=$version" >> $GITHUB_OUTPUT
          echo "SENTRY_RELEASE=$version" >> $GITHUB_ENV
          export SENTRY_RELEASE=$version
          SENTRY_RELEASE=$version
          npm run build
      - run: npx cap sync

      - uses: actions/cache@v4
        with:
          path: |
            ./*
          key: ${{ github.run_id }}
          
  buildIOS:
    name: Build iOS
    runs-on: macos-latest
    needs: [prepareCache]
    env:
      SENTRY_RELEASE: ${{ needs.prepareCache.outputs.SENTRY_RELEASE }}
    steps:
      - uses: actions/cache@v4
        with:
          path: |
            ./*
          key: ${{ github.run_id }}
      - uses: actions/checkout@v4
        with:
          token: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.ELEVATED_GITHUB_TOKEN || github.token }}
      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.SIGNINGCERTIFICATE }}
          P12_PASSWORD: ${{ secrets.SIGNINGCERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles  
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLESERVICEINFOPLIST_BASE64 }}" | base64 --decode > ios/App/App/GoogleService-Info.plist
      - name: npm ci + build
        run: | 
          npm ci
          npm run ios
          cd ios/App
          pod install

      - name: build archive
        run: |
          xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -archivePath $RUNNER_TEMP/App.xcarchive \
          -sdk iphoneos \
          -configuration Debug \
          -destination generic/platform=iOS \
          clean archive
        working-directory: ios/App
  
      - name: export ipa
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.EXPORT_OPTIONS_PLIST }}
        run: |
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o $EXPORT_OPTS_PATH
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive -exportOptionsPlist $EXPORT_OPTS_PATH -exportPath $RUNNER_TEMP/build          
        working-directory: ios/App

      - name: Upload application
        uses: actions/upload-artifact@v3
        with:
          name: app
          path: ${{ runner.temp }}/build/App.ipa
          
      - name: Upload dSYMs
        uses: actions/upload-artifact@v3
        with:
          name: dsyms
          path: ${{ runner.temp }}/build/App.app.dSYM.zip