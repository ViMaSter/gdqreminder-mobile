name: iOS build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      forceRelease:
        description: Force App Store release?
        required: true
        default: false
        type: boolean
      runIntegrationTests:
        description: Skip integration tests?
        required: true
        default: false
        type: boolean

env:
  SENTRY_AUTH_TOKEN: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.SENTRY_AUTH_TOKEN || '' }}

jobs:
  prepareCache:
    name: Pre-build + test
    runs-on: ubuntu-latest
    outputs:
      SENTRY_RELEASE: ${{ steps.version.outputs.SENTRY_RELEASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.ELEVATED_GITHUB_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: | 
          npm ci
      - name: Install Playwright Browsers
        if: ${{ github.event.inputs.runIntegrationTests }}
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        if: ${{ github.event.inputs.runIntegrationTests }}
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - run: | 
          npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease
      - id: version
        run: | 
          version=v$(jq -r .version package.json)
          echo $version
          echo "SENTRY_RELEASE=$version" >> $GITHUB_OUTPUT
          echo "SENTRY_RELEASE=$version" >> $GITHUB_ENV
          export SENTRY_RELEASE=$version
          SENTRY_RELEASE=$version
          npm run build
      - run: npx cap sync

      - uses: actions/cache@v4
        with:
          path: |
            ./*
          key: ${{ github.run_id }}
          
  buildIOS:
    name: Build iOS
    runs-on: macos-latest
    needs: [prepareCache]
    env:
      SENTRY_RELEASE: ${{ needs.prepareCache.outputs.SENTRY_RELEASE }}
    steps:
      - uses: actions/cache@v4
        with:
          path: |
            ./*
          key: ${{ github.run_id }}
      - uses: actions/checkout@v4
        with:
          token: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event.inputs.forceRelease) && secrets.ELEVATED_GITHUB_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Write GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLESERVICEINFOPLIST_BASE64 }}" | base64 --decode > ios/App/App/GoogleService-Info.plist
      - name: npm ci + build
        run: | 
          npm ci
          npm run ios
          cd ios/App
          pod install
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath $PWD/build/App.xcarchive archive
          xcodebuild -exportArchive -archivePath $PWD/build/App.xcarchive -exportOptionsPlist exportOptions.plist -exportPath $PWD/build
      - uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ needs.prepareCache.outputs.SENTRY_RELEASE }}
          path: ./build/App.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: dSYM-${{ needs.prepareCache.outputs.SENTRY_RELEASE }}
          path: ./build/App.dSYM.zip